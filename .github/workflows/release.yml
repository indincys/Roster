name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    name: Quality gates
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

  package-macos:
    name: Package macOS arm64
    needs: quality
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distributables
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm --workspace @roster/desktop run dist -- --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roster-macos-arm64
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.dmg.blockmap
            apps/desktop/release/*.zip
            apps/desktop/release/*.zip.blockmap
            apps/desktop/release/latest-mac.yml
          if-no-files-found: error

  package-windows:
    name: Package Windows x64
    needs: quality
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distributables
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm --workspace @roster/desktop run dist -- --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roster-windows-x64
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.exe.blockmap
            apps/desktop/release/latest.yml
          if-no-files-found: error

  draft-release:
    name: Draft GitHub Release
    needs:
      - package-macos
      - package-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          files: release-artifacts/*
          generate_release_notes: true
