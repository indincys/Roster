name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    name: Quality gates
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

  package-macos:
    name: Package macOS arm64
    needs: quality
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npm run build

      - name: Import macOS signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/YourApp-Self-Signed.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/roster-signing.keychain-db"
          CERT_PEM="$RUNNER_TEMP/YourApp-Self-Signed.pem"

          printf '%s' "$CSC_LINK" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$(security login-keychain | tr -d '"')"
          security find-certificate -c "YourApp Self-Signed" -p "$KEYCHAIN_PATH" > "$CERT_PEM"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign -k /Library/Keychains/System.keychain "$CERT_PEM"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | tee "$RUNNER_TEMP/codesigning-identities.txt"
          grep -q '"YourApp Self-Signed"' "$RUNNER_TEMP/codesigning-identities.txt"
          grep -Eq '[1-9][0-9]* valid identities found' "$RUNNER_TEMP/codesigning-identities.txt"
          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build distributables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm --workspace @roster/desktop run dist -- --publish never

      - name: Verify macOS code signature
        run: codesign --verify --deep --strict --verbose=2 "apps/desktop/release/mac-arm64/短视频运营工作台.app"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roster-macos-arm64
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.dmg.blockmap
            apps/desktop/release/*.zip
            apps/desktop/release/*.zip.blockmap
            apps/desktop/release/latest-mac.yml
          if-no-files-found: error

  package-windows:
    name: Package Windows x64
    needs: quality
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npm run build

      - name: Build distributables
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm --workspace @roster/desktop run dist -- --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roster-windows-x64
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.exe.blockmap
            apps/desktop/release/latest.yml
          if-no-files-found: error

  draft-release:
    name: Draft GitHub Release
    needs:
      - package-macos
      - package-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate update manifest
        env:
          RELEASE_DIR: release-artifacts
          OUTPUT_PATH: release-artifacts/latest.json
          DOWNLOAD_URL_PREFIX: https://github.com/indincys/Roster/releases/download/${{ github.ref_name }}
          RELEASE_NOTES: Roster ${{ github.ref_name }} release.
        run: npm run release:manifest

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          files: release-artifacts/*
          generate_release_notes: true
